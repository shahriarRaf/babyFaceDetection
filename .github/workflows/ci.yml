name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-checks:
    name: Python checks & safety
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Syntax check (compile all .py files)
        run: python -m compileall -q .

      - name: Verify .gitignore contains secrets and weights
        run: |
          missing=0
          if ! grep -Fxq "service-account.json" .gitignore; then echo "ERROR: service-account.json not found in .gitignore"; missing=1; fi
          if ! grep -Fxq "*.pt" .gitignore; then echo "ERROR: *.pt not found in .gitignore"; missing=1; fi
          if [ "$missing" -eq 1 ]; then exit 1; fi
